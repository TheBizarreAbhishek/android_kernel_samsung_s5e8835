name: Kernel Build

on:
  workflow_dispatch:  # Only triggers manually

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Kernel Source
      uses: actions/checkout@v4

    - name: Setup Environment
      run: |
        sudo apt update && sudo apt install -y bc bison flex build-essential \
          libssl-dev libncurses-dev ccache lzop zip unzip curl wget python3 \
          gcc-12-aarch64-linux-gnu

    - name: Restore Toolchain Cache
      id: cache-clang
      uses: actions/cache@v4
      with:
        path: toolchains/proton-clang
        key: clang-${{ runner.os }}-proton-2025
        restore-keys: |
          clang-${{ runner.os }}-proton-

    - name: Download Proton Clang (if cache is missing)
      if: steps.cache-clang.outputs.cache-hit != 'true'
      run: |
        wget https://raw.githubusercontent.com/WeebProject/clang/main/clang-17.tar.zst
        mkdir -p toolchains/proton-clang
        tar --use-compress-program=unzstd -xvf clang-17.tar.zst -C toolchains/proton-clang --strip-components=1
        rm clang-17.tar.zst

    - name: Compile Kernel
      run: |
        export ARCH=arm64
        export SUBARCH=arm64
        export CROSS_COMPILE=aarch64-linux-gnu-
        export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
        export KBUILD_BUILD_USER="TheBizarreAbhishek"
        export KBUILD_BUILD_HOST="GitHubActions"
        export PATH=$GITHUB_WORKSPACE/toolchains/proton-clang/bin:$PATH

        # Enable LLVM optimizations
        export LD=ld.lld
        export LLVM=1
        export LLVM_IAS=1
        export LTO=thin

        # Avoid warnings breaking the build
        export KCFLAGS="-Wno-error"

        # Start the build
        make O=out m35x_defconfig
        make O=out -j$(nproc --all)

    - name: Package Kernel (AnyKernel3)
      run: |
        git clone --depth=1 https://github.com/TheBizarreAbhishek/AnyKernel3.git ak3
        cp out/arch/arm64/boot/Image.gz-dtb ak3/
        cd ak3 && zip -r9 Kernel.zip ./*

    - name: Upload Kernel ZIP
      uses: actions/upload-artifact@v4
      with:
        name: Kernel-ZIP
        path: ak3/Kernel.zip
