name: Build BizarreKernel

on:
  
  workflow_dispatch:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: TheBizarreAbhishek/android_kernel_samsung_s5e8835
          path: kernel

      - name: Checkout AnyKernel3
        uses: actions/checkout@v4
        with:
          repository: TheBizarreAbhishek/AnyKernel3
          path: AnyKernel3

      - name: Setup Environment
        run: |
          sudo apt update
          sudo apt install -y bc cpio flex bison python3 curl zip unzip libssl-dev

      - name: Restore Toolchain Cache
        id: cache-toolchain
        uses: actions/cache@v4
        with:
          path: |
            ~/toolchains/aarch64-linux-android-4.9
            ~/toolchains/clang-r383902
          key: toolchain-${{ runner.os }}

      - name: Clone Toolchains (if not cached)
        run: |
          mkdir -p ~/toolchains
          cd ~/toolchains
          if [ ! -d "aarch64-linux-android-4.9" ]; then
            git clone --depth=1 --branch android-11.0.0_r48 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9
          fi
          if [ ! -d "clang-r383902" ]; then
            git clone --depth=1 https://github.com/prorooter007/android_prebuilts_clang_host_linux-x86_clang-6877366 clang-r383902
          fi

      - name: Build Kernel
        run: |
          cd kernel
          export ARCH=arm64
          export CROSS_COMPILE=~/toolchains/aarch64-linux-android-4.9/bin/aarch64-linux-android-
          export CLANG_TRIPLE=~/toolchains/clang-r383902/bin/aarch64-linux-gnu-
          export PATH=$PATH:~/toolchains/aarch64-linux-android-4.9/bin:~/toolchains/clang-r383902/bin
          
          make -j$(nproc) m35x_defconfig
          make -j$(nproc)

      - name: Package Kernel with AnyKernel3
        run: |
          cd kernel
          if [ -f "arch/arm64/boot/Image" ]; then
            cp arch/arm64/boot/Image ../AnyKernel3/zImage
            cd ../AnyKernel3
            zip -r9 BizarreKernel.zip . -x .git README.md *placeholder
          fi

      - name: Upload Kernel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BizarreKernel
          path: AnyKernel3/BizarreKernel.zip

      - name: Release Kernel on GitHub
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          name: "BizarreKernel for SM-M356B with KernelSU"
          files: AnyKernel3/BizarreKernel.zip
          tag_name: release-${{ github.run_number }}

      - name: Delete Old Workflow Runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 0
          keep_minimum_runs: 1
